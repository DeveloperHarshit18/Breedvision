<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a1628" />
    <meta name="description" content="BreedVision — AI-powered cattle & buffalo breed recognition" />
    <title>BreedVision</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>
<script>
function uploadImage() {
    const fileInput = document.getElementById("imageInput");
    const file = fileInput.files[0];

    const formData = new FormData();
    formData.append("image", file);

    fetch("/predict", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        console.log(data);

        if (data.predictions && data.predictions.length > 0) {
            const pred = data.predictions[0];
            document.getElementById("result").innerText =
                "Breed: " + pred.class + " (" + (pred.confidence * 100).toFixed(2) + "%)";
        } else {
            document.getElementById("result").innerText = "No prediction";
        }
    });
}
</script>


    <div id="root"></div>
  </body>
</html>
